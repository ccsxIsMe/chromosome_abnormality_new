experiment_name: local_global_pair_resnet18_chrid_multi_prototype_metric_style_consistency_k4_soft

experiment_mode: multi_prototype_metric

seed: 42
device: cuda

data:
  train_csv: /data5/chensx/MyProject/chromosome_abnormality_new/data/train_pair.csv
  val_csv: /data5/chensx/MyProject/chromosome_abnormality_new/data/val_pair.csv
  test_csv: /data5/chensx/MyProject/chromosome_abnormality_new/data/test_pair.csv
  image_size: 300
  num_workers: 4

model:
  name: resnet18
  num_classes: 2
  pretrained: true
  use_chromosome_id: true
  use_pair_input: true
  pair_model_type: local_global
  chr_embed_dim: 16

  num_prototypes: 4
  prototype_distance: cosine
  normalize_prototype_embedding: true

  use_pair_mixstyle: false
  mixstyle_p: 0.5
  mixstyle_alpha: 0.1

train:
  batch_size: 128
  epochs: 40
  lr: 0.0001
  weight_decay: 0.0001

loss:
  name: ce
  class_weights: [1.0, 20.0]
  focal_gamma: 2.0

  metric:
    cls_weight: 0.5
    normal_weight: 1.0
    abnormal_weight: 1.0
    abnormal_margin: 0.35
    diversity_weight: 0.05
    diversity_margin: 0.2

style_consistency:
  enabled: true
  style_task_weight: 0.3
  embedding_weight: 0.3
  score_weight: 0.3
  teacher_detach: true
  embedding_mode: cosine
  score_mode: mse

calibration:
  enabled: false
  method: zscore

output:
  save_dir: /data5/chensx/MyProject/chromosome_abnormality_new/outputs/experiments

best_model_metric: auprc