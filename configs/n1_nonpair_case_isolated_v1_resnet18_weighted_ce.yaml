experiment_name: n1_nonpair_case_isolated_v1_resnet18_weighted_ce

seed: 42
device: cuda

data:
  train_csv: data_protocol/nonpair_case_isolated_v1/train.csv
  val_csv: data_protocol/nonpair_case_isolated_v1/val.csv
  test_csv: data_protocol/nonpair_case_isolated_v1/test.csv
  image_size: 300
  num_workers: 4

model:
  name: resnet18
  num_classes: 2
  pretrained: true
  use_chromosome_id: false
  use_pair_input: false
  chr_embed_dim: 16

train:
  batch_size: 64
  epochs: 40
  lr: 0.0001
  weight_decay: 0.0001

loss:
  name: ce
  class_weights: [0.511111, 23.0]
  focal_gamma: 2.0

output:
  save_dir: outputs/experiments

best_model_metric: auprc
