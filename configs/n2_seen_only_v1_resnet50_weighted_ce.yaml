experiment_name: n2_seen_only_v1_resnet50_weighted_ce

seed: 42
device: cuda

data:
  train_csv: data_protocol/n2_seen_only_v1/train.csv
  val_csv: data_protocol/n2_seen_only_v1/val.csv
  test_csv: data_protocol/n2_seen_only_v1/test.csv
  image_size: 300
  num_workers: 4

model:
  name: resnet50
  num_classes: 6
  pretrained: true
  use_chromosome_id: false
  use_pair_input: false
  chr_embed_dim: 16

train:
  batch_size: 4
  epochs: 40
  lr: 0.0001
  weight_decay: 0.0001

loss:
  name: ce
  class_weights: [0.447222, 2.439394, 1.677083, 0.894444, 1.118056, 1.341667]
  focal_gamma: 2.0

output:
  save_dir: outputs/experiments

best_model_metric: macro_f1
