experiment_name: n3_nonpair_case_isolated_v1_resnet18_multi_prototype_metric

experiment_mode: multi_prototype_metric

seed: 42
device: cuda

data:
  train_csv: data_protocol/nonpair_case_isolated_v1/train.csv
  val_csv: data_protocol/nonpair_case_isolated_v1/val.csv
  test_csv: data_protocol/nonpair_case_isolated_v1/test.csv
  image_size: 300
  num_workers: 4

model:
  name: resnet18
  num_classes: 2
  pretrained: true
  use_chromosome_id: true
  use_pair_input: false
  chr_embed_dim: 16
  num_prototypes: 4
  prototype_distance: cosine
  normalize_prototype_embedding: true

train:
  batch_size: 16
  epochs: 40
  lr: 0.0001
  weight_decay: 0.0001

loss:
  name: ce
  class_weights: [0.511111, 23.0]
  focal_gamma: 2.0
  metric:
    cls_weight: 0.5
    normal_weight: 1.0
    abnormal_weight: 1.0
    abnormal_margin: 0.35
    diversity_weight: 0.05
    diversity_margin: 0.2

calibration:
  enabled: true
  method: zscore

output:
  save_dir: outputs/experiments

best_model_metric: auprc
