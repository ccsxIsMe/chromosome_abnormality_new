experiment_name: p11_pair_case_isolated_v1_correspondence_interval_multi_prototype_metric

experiment_mode: multi_prototype_metric

seed: 42
device: cuda

data:
  train_csv: data_protocol/p1_pair_case_isolated_v1/train.csv
  val_csv: data_protocol/p1_pair_case_isolated_v1/val.csv
  test_csv: data_protocol/p1_pair_case_isolated_v1/test.csv
  image_size: 300
  num_workers: 4

model:
  name: resnet18
  num_classes: 2
  pretrained: true
  use_chromosome_id: true
  use_pair_input: true
  pair_model_type: correspondence_interval
  chr_embed_dim: 16
  num_prototypes: 4
  prototype_distance: cosine
  normalize_prototype_embedding: true

train:
  batch_size: 24
  epochs: 50
  lr: 0.0001
  weight_decay: 0.0001
  sampler:
    enabled: true
    strategy: inverse_freq
    replacement: true
    num_samples: auto

loss:
  name: ce
  metric:
    cls_weight: 0.2
    normal_weight: 1.0
    abnormal_weight: 1.2
    abnormal_margin: 0.35
    diversity_weight: 0.05
    diversity_margin: 0.2
    structure_weight: 0.4
    pericentric_weight: 1.0
    arm_weight: 1.0
    major_weight: 1.0

calibration:
  enabled: true
  method: zscore

output:
  save_dir: outputs/experiments

best_model_metric: auprc
