experiment_name: p13_pair_normal_only_v1_correspondence_interval_multi_prototype_metric_train_normal_casewise_q99

experiment_mode: multi_prototype_metric

seed: 42
device: cuda

data:
  train_csv: data_protocol/p12_pair_normal_only_v1/train.csv
  val_csv: data_protocol/p12_pair_normal_only_v1/val.csv
  test_csv: data_protocol/p12_pair_normal_only_v1/test.csv
  image_size: 300
  num_workers: 4

model:
  name: resnet18
  num_classes: 2
  pretrained: true
  use_chromosome_id: true
  use_pair_input: true
  pair_model_type: correspondence_interval
  chr_embed_dim: 16
  num_prototypes: 4
  prototype_distance: cosine
  normalize_prototype_embedding: true

train:
  batch_size: 64
  epochs: 50
  lr: 0.0001
  weight_decay: 0.0001

loss:
  name: ce
  metric:
    cls_weight: 0.0
    normal_weight: 1.0
    abnormal_weight: 0.0
    abnormal_margin: 0.35
    diversity_weight: 0.05
    diversity_margin: 0.2
    structure_weight: 0.0

calibration:
  enabled: true
  method: zscore

anomaly_threshold:
  enabled: true
  method: quantile
  quantile: 0.99
  mean_std_k: 3.0
  use_casewise_scores: true

output:
  save_dir: outputs/experiments

best_model_metric: auprc
