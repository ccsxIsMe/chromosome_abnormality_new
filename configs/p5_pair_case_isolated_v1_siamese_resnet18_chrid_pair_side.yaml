experiment_name: p5_pair_case_isolated_v1_siamese_resnet18_chrid_pair_side

seed: 42
device: cuda

data:
  train_csv: data_protocol/p1_pair_case_isolated_v1/train.csv
  val_csv: data_protocol/p1_pair_case_isolated_v1/val.csv
  test_csv: data_protocol/p1_pair_case_isolated_v1/test.csv
  image_size: 300
  num_workers: 4
  train_random_swap: true

model:
  name: resnet18
  num_classes: 2
  pretrained: true
  use_chromosome_id: true
  use_pair_input: true
  pair_model_type: siamese
  chr_embed_dim: 16
  use_side_head: true
  num_side_classes: 2

train:
  batch_size: 64
  epochs: 40
  lr: 0.0001
  weight_decay: 0.0001

loss:
  name: ce
  class_weights: [0.5208, 12.5305]
  focal_gamma: 2.0
  auxiliary:
    enabled: true
    name: pair_side
    side_weight: 0.5
    side_class_weights: [1.0, 1.0]

output:
  save_dir: outputs/experiments

best_model_metric: auprc
