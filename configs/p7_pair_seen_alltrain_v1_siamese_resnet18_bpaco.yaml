experiment_name: p7_pair_seen_alltrain_v1_siamese_resnet18_bpaco

seed: 42
device: cuda

data:
  train_csv: data_protocol/p7_pair_seen_alltrain_v1/train.csv
  val_csv: data_protocol/p7_pair_seen_alltrain_v1/val.csv
  test_csv: data_protocol/p7_pair_seen_alltrain_v1/test.csv
  image_size: 300
  num_workers: 4

model:
  name: resnet18
  num_classes: 17
  pretrained: true
  use_chromosome_id: false
  use_pair_input: true
  pair_model_type: siamese

train:
  batch_size: 64
  epochs: 40
  lr: 0.0001
  weight_decay: 0.0001
  sampler:
    enabled: true
    strategy: inverse_freq
    replacement: true
    num_samples: auto

loss:
  name: ce
  auxiliary:
    enabled: true
    name: bpaco
    num_classes: 17
    class_counts: [60, 32, 31, 24, 34, 28, 33, 26, 20, 11, 25, 21, 36, 16, 30, 30, 34]
    cls_weight: 1.0
    contrastive_weight: 0.2
    temperature: 0.07
    queue_size: 512
    center_momentum: 0.9
    logit_tau: 1.0

output:
  save_dir: outputs/experiments

best_model_metric: macro_f1
