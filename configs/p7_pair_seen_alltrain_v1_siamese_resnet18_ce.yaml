experiment_name: p7_pair_seen_alltrain_v1_siamese_resnet18_ce

seed: 42
device: cuda

data:
  train_csv: data_protocol/p7_pair_seen_alltrain_v1/train.csv
  val_csv: data_protocol/p7_pair_seen_alltrain_v1/val.csv
  test_csv: data_protocol/p7_pair_seen_alltrain_v1/test.csv
  image_size: 300
  num_workers: 4

model:
  name: resnet18
  num_classes: 17
  pretrained: true
  use_chromosome_id: false
  use_pair_input: true
  pair_model_type: siamese

train:
  batch_size: 32
  epochs: 40
  lr: 0.0001
  weight_decay: 0.0001
  sampler:
    enabled: true
    strategy: inverse_freq
    replacement: true
    num_samples: auto

loss:
  name: ce

output:
  save_dir: outputs/experiments

best_model_metric: macro_f1
