# scheme3_pair_level.yaml

experiment_name: scheme3_pair_level

seed: 42
device: cuda

data:
  train_csv: /data5/chensx/MyProject/chromosome_abnormality_new/data_randomized/scheme3_pair_level/train_pair.csv
  val_csv: /data5/chensx/MyProject/chromosome_abnormality_new/data_randomized/scheme3_pair_level/val_pair.csv
  test_csv: /data5/chensx/MyProject/chromosome_abnormality_new/data_randomized/scheme3_pair_level/test_pair.csv
  image_size: 300
  num_workers: 4

model:
  name: resnet18
  num_classes: 2
  pretrained: true
  use_chromosome_id: false
  use_pair_input: true
  chr_embed_dim: 16

train:
  batch_size: 128
  epochs: 60
  lr: 0.0001
  weight_decay: 0.0001


loss:
  name: focal
  class_weights: null # [1.0, 20.0] null
  focal_gamma: 2.0

optimizer:
  name: adamw
  lr: 1e-4
  weight_decay: 1e-5

scheduler:
  name: cosine

output:
  save_dir: /data5/chensx/MyProject/chromosome_abnormality_new/outputs/experimentsromosome_abnormality_new/outputs/experiments